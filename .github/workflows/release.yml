name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            arch: x64
            suffix: -Intel
          - os: macos-14
            arch: arm64
            suffix: -AppleSilicon
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview httpx
          pip install -r backend/requirements.txt

      - name: Build macOS app
        run: python -m PyInstaller build/winkterm.spec --clean --noconfirm

      - name: Create zip
        run: |
          cd dist
          zip -r WinkTerm-macOS${{ matrix.suffix }}.zip WinkTerm.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinkTerm-macOS${{ matrix.suffix }}
          path: dist/WinkTerm-macOS${{ matrix.suffix }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview httpx
          pip install -r backend/requirements.txt

      - name: Build Windows exe
        run: python -m PyInstaller build/winkterm.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinkTerm-Windows
          path: dist/WinkTerm.exe

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: WinkTerm-macOS-Intel
          path: artifacts/

      - name: Download macOS AppleSilicon artifact
        uses: actions/download-artifact@v4
        with:
          name: WinkTerm-macOS-AppleSilicon
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: WinkTerm-Windows
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
