# Agent 配置注册表
agents:
  terminal:
    description: 终端内Agent，直接操作终端
    tools:
      - write_command  # 写入命令等待用户确认
      - get_terminal_context
    prompt: terminal.yaml
    model: default

  chat:
    description: 通用对话助手
    tools: []
    prompt: chat.yaml
    model: default

  craft:
    description: 代码创作助手，可直接操作终端
    tools:
      - terminal_input  # 直接执行命令
      - get_terminal_context
    prompt: craft.yaml
    model: default
