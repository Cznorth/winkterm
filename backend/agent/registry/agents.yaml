# Agent 配置注册表
agents:
  terminal:
    description: 终端内Agent，直接操作终端
    tools:
      - terminal  # 使用 terminal 模块的所有工具
    prompt: terminal.yaml
    model: default  # 使用默认模型

  chat:
    description: 通用对话助手
    tools: []  # 暂无工具
    prompt: chat.yaml
    model: default

  craft:
    description: 代码创作助手，可直接操作终端
    tools:
      - terminal
    prompt: craft.yaml
    model: default
