# Agent Configuration Registry
agents:
  terminal:
    description: In-terminal lightweight agent, operates the active terminal directly
    tools:
      - write_command
      - get_terminal_context
    prompt: terminal.yaml
    model: default

  chat:
    description: General-purpose chat assistant
    tools: []
    prompt: chat.yaml
    model: default

  craft:
    description: Full terminal toolset agent for cross-terminal orchestration
    tools:
      - terminal
    prompt: craft.yaml
    model: default
